<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JOB Engenharia e Soluções Ambientais — Site em Construção</title>
<link rel="icon" type="image/png" href="img/favicon.png">
<link rel="apple-touch-icon" href="img/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --green-dark: #00662f;
    --green: #199738;
    --green-bright: #34a853;
    --ink: #1f2a23;
    --muted: #5b6b60;
    --line: rgba(46,139,72,.045);
    --bg: #ffffff;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    font-family:"Sora",system-ui,sans-serif;
    color:var(--ink);
    background-color:var(--bg);
    /* grade de fundo bem suave */
    background-image:
      linear-gradient(to right, var(--line) 1px, transparent 1px),
      linear-gradient(to bottom, var(--line) 1px, transparent 1px);
    background-size:64px 64px;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:24px;
    position:relative;
    overflow-x:hidden;
  }

  /* Badge superior esquerdo */
  .badge{
    position:fixed;
    top:30px;left:24px;
    display:inline-flex;align-items:center;gap:8px;
    background:#fff;
    border:1px solid rgba(46,139,72,.25);
    color:var(--green-dark);
    font-size:13px;font-weight:500;
    padding:8px 16px;border-radius:999px;
    box-shadow:0 4px 14px rgba(20,80,40,.06);
  }
  .badge svg{width:15px;height:15px}

  /* Três quadradinhos superior direito */
  .dots{position:fixed;top:34px;right:32px;display:flex;gap:6px}
  .dots span{width:18px;height:18px;border-radius:3px}
  .dots span:nth-child(1){background:#1d1d1b}
  .dots span:nth-child(2){background:var(--green-dark)}
  .dots span:nth-child(3){background:var(--green-bright)}

  /* Conteúdo central */
  .wrap{max-width:760px;width:100%;text-align:center}

  .logo{display:flex;justify-content:center;margin-bottom:56px}
  .logo img{width:190px;height:auto;display:block}

  h1{
    font-size:clamp(34px,6vw,52px);
    font-weight:700;line-height:1.1;color:var(--ink);
    margin-bottom:24px;
  }
  h1 .accent{display:block;color:var(--green);}

  .lead{
    font-size:clamp(16px,2.4vw,20px);
    color:var(--muted);line-height:1.6;font-weight:400;
    max-width:560px;margin:0 auto 48px;
  }

  /* Barra de progresso */
  .progress{max-width:280px;margin:0 auto 64px}
  .progress .pct{font-size:10px;color:rgba(91,107,96,.6);letter-spacing:1px;margin-bottom:8px}
  .progress .track{display:flex;align-items:center;gap:4px}
  .progress .seg{width:14px;height:8px;border-radius:2px;background:var(--green-dark)}
  .progress .bar{
    flex:1;height:8px;border-radius:999px;
    background:#e3efe7;overflow:hidden;
  }
  .progress .fill{
    height:100%;width:0;border-radius:999px;
    background:linear-gradient(90deg,var(--green-dark),var(--green-bright));
    transition:width 1.6s cubic-bezier(.22,1,.36,1);
  }

  /* Contato */
  .contact .label{
    font-size:12px;letter-spacing:2px;color:var(--muted);
    text-transform:uppercase;margin-bottom:14px;
  }
  .contact a{
    display:inline-flex;align-items:center;gap:8px;
    color:var(--ink);text-decoration:none;font-size:17px;
    transition:color .2s;
  }
  .contact a:hover{color:var(--green)}
  .contact svg{width:17px;height:17px;color:var(--green)}

  footer{
    position:fixed;bottom:20px;left:0;right:0;text-align:center;
    font-size:13px;color:rgba(91,107,96,.55);
  }

  @media(max-width:600px){
    .badge{top:16px;left:16px;font-size:12px;padding:6px 12px}
    .dots{top:18px;right:16px}
    .logo{margin-bottom:40px}
    .logo img{width:160px}
  }
</style>
</head>
<body>

  <!-- Badge -->
  <div class="badge">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 13 1-3a2 2 0 0 1 2-1h6a2 2 0 0 1 2 1l1 3"/><path d="M3 18h18"/><path d="M5 18v-2a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v2"/></svg>
    Em construção
  </div>

  <!-- Três quadrados -->
  <div class="dots"><span></span><span></span><span></span></div>

  <div class="wrap">
    <!-- Logo -->
    <div class="logo">
      <img src="img/logo-job-eng.svg" alt="JOB Engenharia e Soluções Ambientais">
    </div>

    <h1>Engenharia que move <span class="accent">o futuro</span></h1>

    <p class="lead">Estamos construindo uma nova experiência digital para você.<br>Nosso site estará disponível em breve.</p>

    <!-- Progresso -->
    <div class="progress">
      <div class="pct">65%</div>
      <div class="track">
        <span class="seg"></span><span class="seg"></span><span class="seg"></span>
        <div class="bar"><div class="fill" id="fill"></div></div>
      </div>
    </div>

    <!-- Contato -->
    <div class="contact">
      <div class="label">Entre em contato</div>
      <a href="mailto:contato@jobeng.com.br">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
        contato@jobeng.com.br
      </a>
    </div>
  </div>

  <footer>© 2026 JOB Engenharia. Todos os direitos reservados.</footer>

  <script>
    // anima a barra até 65% ao carregar
    window.addEventListener('load', () => {
      setTimeout(() => { document.getElementById('fill').style.width = '65%'; }, 300);
    });
  </script>

</body>
</html>
